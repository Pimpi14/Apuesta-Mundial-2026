<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Pro-Bracket Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080d1a; --bg2: #0f1623; --card: #111827;
            --border: #1e2d45; --accent: #00e5b8; --accent2: #f5c518;
            --text: #eef2ff; --text2: #7b91b0;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px;
        }

        h1 { font-family: 'Bebas Neue', cursive; color: var(--accent); text-align: center; font-size: 3rem; }

        .bracket-scroll {
            display: flex; overflow-x: auto; gap: 30px; padding-bottom: 20px;
            scroll-snap-type: x mandatory;
        }

        .round-column { min-width: 280px; flex: 1; }
        .round-column h2 { 
            text-align: center; font-family: 'Bebas Neue'; color: var(--accent2); 
            border-bottom: 2px solid var(--border); padding-bottom: 10px;
        }

        .match-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; margin-bottom: 15px;
            transition: transform 0.2s;
        }

        .match-card:hover { border-color: var(--accent); }

        .match-id { font-size: 0.7rem; color: var(--text2); margin-bottom: 8px; display: block; }

        .team-row {
            display: flex; justify-content: space-between; align-items: center; margin: 5px 0;
        }

        .team-name { font-weight: 500; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }

        .inputs-group { display: flex; align-items: center; gap: 8px; }

        input[type="number"] {
            width: 45px; background: var(--bg2); border: 1px solid var(--border);
            color: white; border-radius: 4px; padding: 4px; text-align: center;
        }

        input[type="radio"] { accent-color: var(--accent); cursor: pointer; }

        .btn-update {
            display: block; margin: 20px auto; padding: 10px 25px;
            background: var(--accent); color: var(--bg); font-weight: bold;
            border: none; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>⚽ WORLD CUP 2026 BRACKET ENGINE</h1>

    <div class="bracket-scroll" id="main-bracket">
        </div>

    <script>
        // CONFIGURACIÓN TÉCNICA DE CRUCES (OFICIAL FIFA 2026)
        const CONFIG = {
            r32: [
                { id: 65, h: "1A", a: "3C/E/F/H/I/J" }, { id: 66, h: "2A", a: "2B" },
                { id: 67, h: "1B", a: "3A/C/D/F/G/I" }, { id: 68, h: "1C", a: "3A/B/D/E/G/H" },
                { id: 69, h: "2C", a: "2D" },             { id: 70, h: "1D", a: "3B/E/F/G/I/J" },
                { id: 71, h: "1E", a: "3A/B/C/D/F/G" }, { id: 72, h: "1F", a: "2E" },
                { id: 73, h: "1G", a: "3A/B/C/E/H/I" }, { id: 74, h: "1H", a: "2G" },
                { id: 75, h: "1I", a: "3C/D/E/G/H/J" }, { id: 76, h: "1J", a: "2I" },
                { id: 77, h: "1K", a: "3D/E/F/G/H/I" }, { id: 78, h: "2K", a: "2L" },
                { id: 79, h: "1L", a: "3E/F/G/H/I/J" }, { id: 80, h: "2F", a: "2H" }
            ],
            progresion: {
                65: [81, 'h'], 66: [81, 'a'], 67: [82, 'h'], 68: [82, 'a'],
                81: [89, 'h'], 82: [89, 'a'], 89: [93, 'h'], 93: [95, 'h']
                // Nota: Por brevedad en el ejemplo, se mapean las primeras ramas. 
                // Se debe completar el mapa para los 95 partidos.
            }
        };

        // Generar mapa completo de progresión (81-95)
        for(let i=69, j=83; i<=80; i+=2, j++){
            CONFIG.progresion[i] = [j, 'h']; CONFIG.progresion[i+1] = [j, 'a'];
        }
        for(let i=83, j=90; i<=88; i+=2, j++){
            CONFIG.progresion[i] = [j, 'h']; CONFIG.progresion[i+1] = [j, 'a'];
        }
        CONFIG.progresion[91] = [94, 'h']; CONFIG.progresion[92] = [94, 'a'];
        CONFIG.progresion[94] = [95, 'a'];

        function renderBracket() {
            const container = document.getElementById('main-bracket');
            const rounds = [
                { name: "Dieciseisavos", id: "r32", count: 16, start: 65 },
                { name: "Octavos", id: "r16", count: 8, start: 81 },
                { name: "Cuartos", id: "r8", count: 4, start: 89 },
                { name: "Semis", id: "r4", count: 2, start: 93 },
                { name: "Final", id: "r2", count: 1, start: 95 }
            ];

            rounds.forEach(round => {
                const col = document.createElement('div');
                col.className = 'round-column';
                col.innerHTML = `<h2>${round.name}</h2>`;
                
                for (let i = 0; i < round.count; i++) {
                    const matchId = round.start + i;
                    const isR32 = round.id === 'r32';
                    const labelH = isR32 ? CONFIG.r32[i].h : `Ganador ${matchId}`; // Simplificado
                    const labelA = isR32 ? CONFIG.r32[i].a : `Ganador ${matchId}`;

                    col.innerHTML += `
                        <div class="match-card" id="match-${matchId}">
                            <span class="match-id">PARTIDO ${matchId}</span>
                            <div class="team-row">
                                <span class="team-name" id="t-${matchId}-h-name">${labelH}</span>
                                <div class="inputs-group">
                                    <input type="radio" name="p-${matchId}" id="p-${matchId}-h">
                                    <input type="number" id="s-${matchId}-h" onchange="promover(${matchId})">
                                </div>
                            </div>
                            <div class="team-row">
                                <span class="team-name" id="t-${matchId}-a-name">${labelA}</span>
                                <div class="inputs-group">
                                    <input type="radio" name="p-${matchId}" id="p-${matchId}-a">
                                    <input type="number" id="s-${matchId}-a" onchange="promover(${matchId})">
                                </div>
                            </div>
                        </div>
                    `;
                }
                container.appendChild(col);
            });
        }

        function promover(id) {
            const sH = parseInt(document.getElementById(`s-${id}-h`).value || 0);
            const sA = parseInt(document.getElementById(`s-${id}-a`).value || 0);
            const nH = document.getElementById(`t-${id}-h-name`).innerText;
            const nA = document.getElementById(`t-${id}-a-name`).innerText;
            
            let ganador = "";
            if (sH > sA) ganador = nH;
            else if (sA > sH) ganador = nA;
            else {
                const rH = document.getElementById(`p-${id}-h`).checked;
                ganador = rH ? nH : nA;
            }

            const pro = CONFIG.progresion[id];
            if (pro) {
                const [nextId, side] = pro;
                const target = document.getElementById(`t-${nextId}-${side}-name`);
                if (target) {
                    target.innerText = ganador;
                    target.style.color = "var(--accent)";
                }
            }
        }

        window.onload = renderBracket;
    </script>
</body>
</html>
